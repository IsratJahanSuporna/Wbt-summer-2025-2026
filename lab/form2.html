<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="Registration" content="width=device-width, initial-scale=1.0">
     <title>Registration Form</title>
</head>

<body>
    <div class="reg-form">
        <h1>Registration</h1>
        <p>Please complete all fields below.</p>
    </div>

    <div class="reg-form">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" placeholder="Jane Doe">
    </div>

    <div class="reg-form">
            <label for="postal">Postal Code</label>
            <input type="number" id="postal" placeholder="10001">
    </div>

     <div class="reg-form">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" placeholder="25-06-2026">
    </div>

    <div class="reg-form">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="jane@example.com">
    </div>

    <div class="reg-form">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="********">
    </div>

    <div class="reg-form">
            <label for="country">Country</label>
            <select id="country">
                <option>Select a country...</option>
                <option>Bangladesh</option>
                <option>India</option>
                <option>USA</option>
                <option>Canada</option>
            </select>
        </div>

        <div class="reg-buttons">
            <button type="submit"class="btn-primary">Create Workspace</button>
            <button type="reset" class="btn-secondary">Reset</button>
        </div>

    </div>


</body>
